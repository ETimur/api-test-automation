name: API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1-5'  # Weekdays at 8am UTC

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Run API tests
        run: |
          pytest testcases/ -m sanity \
            --alluredir=allure-results \
            --reruns=1 \
            -v
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          AUTH_EMAIL: ${{ secrets.AUTH_EMAIL }}
          AUTH_PASSWORD: ${{ secrets.AUTH_PASSWORD }}
          FACILITY_ID: ${{ secrets.FACILITY_ID }}
          PROVIDER_ID: ${{ secrets.PROVIDER_ID }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30
